<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Assistant V2 — example screens</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { width: 100%; height: 100%; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .ha-frame * { box-sizing: border-box; }
  .ha-frame button { font-family: inherit; }
  .ha-frame { overflow-y: auto; overflow-x: hidden; height: 100%; -webkit-font-smoothing: antialiased;
              scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.22) transparent; }
  .ha-frame::-webkit-scrollbar { width: 8px; }
  .ha-frame::-webkit-scrollbar-track { background: transparent; }
  .ha-frame::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; border: 2px solid #0e0f12; }
  .ha-frame::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.30); }
  .dc-card .ha-frame { scrollbar-width: thin !important; }
  .dc-card .ha-frame::-webkit-scrollbar { display: block !important; width: 8px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="opt1v2-accordion.jsx"></script>

<script type="text/babel">
function PhoneFrame({ children }) {
  return (
    <div className="ha-frame" style={{
      width: '100%', height: '100%',
      position: 'relative',
      background: '#0e0f12',
    }}>
      <div style={{
        position: 'sticky', top: 0, zIndex: 50,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '8px 18px 4px', fontFamily: 'system-ui',
        fontSize: 13, fontWeight: 600, color: '#fff',
        background: '#0e0f12',
      }}>
        <span>9:41</span>
        <span style={{ display: 'inline-flex', gap: 5, alignItems: 'center', fontSize: 11 }}>
          <span>•••</span>
          <svg width="15" height="10" viewBox="0 0 15 10" fill="none">
            <path d="M0 8L2 6.5L4 7.5L6 5L8 6L10 3L12 4L14 1" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke="white" strokeOpacity="0.6"/>
            <rect x="2" y="2" width="14" height="7" rx="1" fill="white"/>
            <rect x="19.5" y="3.5" width="1.5" height="4" rx="0.5" fill="white" fillOpacity="0.6"/>
          </svg>
        </span>
      </div>
      {children}
    </div>
  );
}

function V2Screen({ initialTab, initialExpanded, scrollTo }) {
  const [rooms, setRooms] = React.useState(() => JSON.parse(JSON.stringify(ROOMS)));
  const onUpdate = (roomId, patch) => {
    setRooms(prev => prev.map(r => r.id === roomId ? { ...r, ...patch } : r));
  };
  // Optional scroll into view of an expanded room after mount
  const frameRef = React.useRef(null);
  React.useEffect(() => {
    if (!scrollTo || !frameRef.current) return;
    const t = frameRef.current.querySelector(`[data-room="${scrollTo}"]`);
    if (t) {
      // Compute and set scrollTop manually (avoid scrollIntoView)
      const frame = frameRef.current.querySelector('.ha-frame') || frameRef.current;
      const top = t.offsetTop - 160;
      frame.scrollTop = Math.max(0, top);
    }
  }, [scrollTo]);
  return (
    <div ref={frameRef} style={{ width: '100%', height: '100%' }}>
      <PhoneFrame>
        <Opt1V2 rooms={rooms} onUpdate={onUpdate}
          initialTab={initialTab} initialExpanded={initialExpanded} />
      </PhoneFrame>
    </div>
  );
}

function Note({ children, w = 240 }) {
  return (
    <div style={{
      background: '#fef4a8', color: '#5a4a2a',
      padding: '10px 12px', fontSize: 11.5, lineHeight: 1.5,
      borderRadius: 4, width: w, fontFamily: 'inherit',
      boxShadow: '0 1px 3px rgba(0,0,0,.08)',
    }}>{children}</div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="Home Assistant V2 — example screens"
        subtitle="Same V2 dashboard, five different states. Tap any artboard's expand icon to focus it fullscreen.">
        <DCArtboard id="readme" label="What's new" width={320} height={620}>
          <div style={{ padding: 22, fontFamily: '"Helvetica Neue", Helvetica, Arial', fontSize: 13, lineHeight: 1.55, color: '#2a251f', background: '#faf8f3', height: '100%' }}>
            <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 12, letterSpacing: -0.3 }}>What's new in this build</div>
            <ul style={{ paddingLeft: 18, margin: 0, paddingBottom: 0 }}>
              <li><strong>Automations & scripts drawer</strong> → tap the chip at the bottom of any expanded room to see its automations + scripts. Icon = toggle on/off (slashes when disabled), name = open settings, play button = trigger / run. Colored labels (Motions, When at home, Need validation, Escape room).</li>
              <li><strong>Batteries badge</strong> → header pill (replaces "Secure"). Click to see every battery + tank level, ordered low → high.</li>
              <li><strong>Cover battery chip</strong> → small % indicator on each shade tile. Grouped covers show the min plus a "·n" count.</li>
              <li><strong>Propane level</strong> → tank % chip on the Living room row.</li>
              <li><strong>Heat pump tile</strong> → mode dropdown on the icon (Heat/Cool, Heat, Cool, Dry, Fan only, Off) + fan + swing dropdowns + on-tile humidity.</li>
              <li><strong>Robot vacuum</strong> → Roby tile in the living room: play/pause/stop/locate/dock + fan speed.</li>
              <li><strong>Light tile bulb icon</strong> → tapping it opens the entity modal directly. Swipe / click / long-press still work everywhere else on the tile.</li>
              <li><strong>Eric's office</strong> → soil moisture chip on the row.</li>
              <li><strong>Motion</strong> → now an icon badge, not a pulsing dot.</li>
              <li><strong>Leak sensors</strong> → Kitchen "Dry", Downstairs bathroom "Leak!" (red, pulsing).</li>
              <li><strong>Door state</strong> → Entrance closed, Workshop open (orange).</li>
              <li><strong>Thermostats</strong> → 24h temperature history sparkline with target dashed line + 24h min/max.</li>
              <li><strong>Outside</strong> → wired up to your real entities: Christmas tree, Front porch, Driveway (unavailable badge), Pool level notification, Vacation mode.</li>
            </ul>
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 18, marginBottom: 6 }}>Screens →</div>
            <ol style={{ paddingLeft: 18, margin: 0 }}>
              <li>Home — All floors overview</li>
              <li>First floor — Kitchen + Entrance open</li>
              <li>First floor — Living room (heat pump + Roby)</li>
              <li>Basement — Theatre + Office open (scenes + sparkline)</li>
              <li>Basement — Bathroom leak alert + Workshop door open</li>
              <li>Outside — your real Outside entities</li>
            </ol>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="screen1" title="1 · Home — all floors"
        subtitle="Default landing. 'All' tab. Quick stats up top. Floor master tiles per floor with collapsed rooms underneath.">
        <DCArtboard id="s1" label="All floors" width={390} height={844}>
          <V2Screen initialTab="All" initialExpanded={[]} />
        </DCArtboard>
        <Note w={220}>
          One tap on a row expands it. One tap on the bulb chip toggles every light in the room. Drag the floor master to dim the whole floor.
        </Note>
      </DCSection>

      <DCSection id="screen2" title="2 · First floor — Kitchen + Entrance open"
        subtitle="Two rooms expanded. Kitchen shows the Coffee cabinet door (state-only). Entrance has the Front door, Chandelier, and three scenes.">
        <DCArtboard id="s2" label="First floor" width={390} height={844}>
          <V2Screen initialTab="First floor" initialExpanded={['kitchen', 'entrance']} scrollTo="kitchen" />
        </DCArtboard>
        <Note w={220}>
          Door tiles are read-only — they reflect the contact sensor. The full-room "lights" pill in the row collapses straight to that single number.
        </Note>
      </DCSection>

      <DCSection id="screen2b" title="2b · Living room — heat pump + Roby"
        subtitle="The heat-pump tile gets a mode dropdown on its icon, plus fan + swing dropdowns and a humidity readout. Roby the robot vacuum lands as its own tile with commands + fan speed.">
        <DCArtboard id="s2b" label="Living room" width={390} height={844}>
          <V2Screen initialTab="First floor" initialExpanded={['living']} scrollTo="living" />
        </DCArtboard>
        <Note w={220}>
          Mode lives inside the heat-pump tile's icon swatch — tap it to swap between Heat/Cool, Heat, Cool, Dry, Fan only, Off. Bulb icon on each light tile now opens the entity modal directly (swipe + long-press still work elsewhere on the tile).
        </Note>
      </DCSection>

      <DCSection id="screen3" title="3 · Basement — Theatre + Office"
        subtitle="Theatre is the heaviest room (4 lights, shades, thermostat, 2 media players, 8 scenes) — see the 24h temp history. Eric's office shows the new soil-moisture chip.">
        <DCArtboard id="s3" label="Basement" width={390} height={844}>
          <V2Screen initialTab="Basement" initialExpanded={['theatre', 'office']} scrollTo="theatre" />
        </DCArtboard>
        <Note w={220}>
          The sparkline area below the thermostat title is the last 24h. Dashed line = target. Replace seed with your real history when wired.
        </Note>
      </DCSection>

      <DCSection id="screen4" title="4 · Basement — Leak alert + Workshop"
        subtitle="Scroll-pinned to the Downstairs bathroom: red 'Leak!' badge in the row. Workshop right below shows its door open in orange.">
        <DCArtboard id="s4" label="Leak alert" width={390} height={844}>
          <V2Screen initialTab="Basement" initialExpanded={['bath_down', 'workshop']} scrollTo="bath_down" />
        </DCArtboard>
        <Note w={220}>
          Both indicators are visible without expanding — the goal is "never tap to check a sensor." Pulsing red draws the eye when it matters.
        </Note>
      </DCSection>

      <DCSection id="screen5" title="5 · Outside — your real entities"
        subtitle="Christmas tree, Front porch lights, Driveway light (with the unavailable warning badge), Pool level notification scene, Vacation mode scene. Temperature 19.7°C.">
        <DCArtboard id="s5" label="Outside" width={390} height={844}>
          <V2Screen initialTab="Outside" initialExpanded={['outside']} />
        </DCArtboard>
        <Note w={220}>
          The driveway light keeps its tile, but it's dimmed with a yellow "!" badge — taps are blocked while unavailable. Scenes use an icon-only row; pool and vacation mode show 'active'.
        </Note>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
