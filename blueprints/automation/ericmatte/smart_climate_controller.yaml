blueprint:
  name: 🌡️ Contrôleur climatique intelligent
  description: |
    Orchestre une thermopompe et des thermostats auxiliaires (plinthes) à l'année, avec bascule hiver/été pilotée par un `input_boolean`.

    - ⚡ **Déclencheur** : changement de présence, seuils de température extérieure, horaires clés (début/fin confort hiver), franchissement des bornes de la bande morte intérieure (été), ou bascule du mode été.
    - 🎯 **Action hiver** : thermopompe sur consigne effective (confort si plage horaire + présence, sinon nuit/absence), auxiliaires à -2 °C en suiveur. Si extérieur < seuil minimum → thermopompe OFF et auxiliaires prennent le relais à +0,5 °C.
    - 🎯 **Action été** : auxiliaires épinglés au plancher (jamais de chauffage), puis cooling piloté par la température **intérieure** — la température extérieure ne sert plus qu'à un verrou bas.
    - 🌡️ **Bande morte été** : intérieur ≥ consigne + 0,5 °C → cooling ; intérieur ≤ consigne − 1 °C → OFF ; entre les deux → on garde l'état courant. Évite les cycles courts autour du setpoint.
    - 🔒 **Verrou extérieur été** : sous `summer_min_outside_temp`, climatiser n'a plus de sens (ouvrir les fenêtres suffit) → thermopompe OFF, même s'il fait encore chaud dedans. Hystérésis de +1 °C avant de relancer.
    - ✋ **Actions manuelles** : changer la consigne ou couper la thermopompe ne déclenche pas l'automation ; elle reprend seulement au prochain déclencheur prévu.
    - ⏱️ **Anti-flicker seuil extérieur** : la température extérieure doit rester du même côté du seuil pendant 5 min avant de déclencher ON/OFF — pas d'oscillation quand la valeur frôle le seuil.

    ```
                          ┌──────────────────┐
                          │  summer_mode ?   │
                          └────────┬─────────┘
                       OFF ────────┴──────── ON
                        │                     │
                  ┌─────▼─────┐         ┌─────▼─────────────────┐
                  │  HIVER    │         │  ÉTÉ                  │
                  └─────┬─────┘         │  aux → floor (pin)    │
                        │               └─────┬─────────────────┘
              ext < min_outside_temp ?        │
                   ┌────┴────┐         personne à la maison ?
                  OUI       NON              ┌─┴─┐
                   │         │              NON OUI
            ┌──────▼──┐  ┌───▼─────┐         │    │
            │ HP OFF  │  │ HP ON   │      ┌──▼─┐  │
            │ aux +0.5│  │ consigne│      │OFF │  │
            └─────────┘  │ effect. │      └────┘  │
                         │ aux −2  │      ext < verrou (hyst. +1) ?
                         └─────────┘             ┌─┴─┐
                                                OUI  NON
                                                 │    │
                                            ┌────▼─┐ ┌▼──────────────────────────┐
                                            │HP OFF│ │ int ≥ cible + 0,5 → COOL  │
                                            └──────┘ │ int ≤ cible − 1   → OFF   │
                                                     │ sinon → état inchangé     │
                                                     └───────────────────────────┘
    ```

  domain: automation
  input:
    # ---- Paramètres communs ----
    heat_pump:
      name: 🌀 Thermopompe
      description: L'entité principale de la thermopompe.
      selector:
        entity:
          domain: climate

    aux_thermostats:
      name: 🔥 Thermostats auxiliaires
      description: Un ou plusieurs thermostats auxiliaires (plinthes).
      selector:
        entity:
          domain: climate
          multiple: true

    outside_temp_sensor:
      name: 🌡️ Capteur de température extérieure
      description: Sonde extérieure utilisée pour les seuils hiver (min thermopompe) et été (besoin de refroidir).
      selector:
        entity:
          domain: sensor

    anybody_home:
      name: 🏠 Capteur de présence
      description: Binary sensor agrégé — `on` = au moins une personne à la maison, `off` = maison vide.
      selector:
        entity:
          domain: binary_sensor

    fan_mode:
      name: 🌀 Mode du ventilateur
      description: Mode du ventilateur à appliquer sur la thermopompe en hiver et en été.
      default: auto
      selector:
        select:
          options:
            - auto
            - low
            - med
            - high
            - quiet

    summer_mode:
      name: 🔀 Bascule mode été
      description: >
        Input boolean qui détermine le mode actif.
        ON = été (climatisation). OFF = hiver (comportement original).
        Câblable à une switch physique pour un override matériel.
      selector:
        entity:
          domain: input_boolean

    # ---- Paramètres du mode hiver ----
    min_outside_temp:
      name: ❄️ Température extérieure minimum pour la thermopompe
      description: >
        En dessous de cette température, la thermopompe est coupée et les
        thermostats auxiliaires prennent le relais.
      default: -10
      selector:
        number:
          min: -30
          max: 10
          unit_of_measurement: "°C"
          mode: box

    target_temp:
      name: ❄️ Température cible
      description: Température de confort normale en hiver.
      default: 21
      selector:
        number:
          min: 16
          max: 25
          unit_of_measurement: "°C"
          mode: slider

    away_night_temp:
      name: ❄️ Consigne nuit/absence
      description: Température à utiliser quand tout le monde est parti ou pendant les heures de nuit.
      default: 18
      selector:
        number:
          min: 16
          max: 25
          unit_of_measurement: "°C"
          mode: slider

    use_target_from:
      name: ❄️ Début de la plage "confort"
      description: Heure à laquelle la consigne de confort devient active (hiver).
      default: "07:00"
      selector:
        time:

    use_target_until:
      name: ❄️ Fin de la plage "confort"
      description: Heure à laquelle la consigne nuit/absence devient active en hiver.
      default: "22:00"
      selector:
        time:

    # ---- Paramètres du mode été ----
    summer_target_temp:
      name: ☀️ Température cible
      description: Température intérieure cible en été.
      default: 20
      selector:
        number:
          min: 18
          max: 28
          unit_of_measurement: "°C"
          mode: slider

    summer_min_outside_temp:
      name: ☀️ Température extérieure minimum pour la climatisation
      description: >
        En dessous de cette température, climatiser n'a plus de sens (ouvrir les
        fenêtres suffit) et la thermopompe est coupée, même si l'intérieur est
        encore chaud. Hystérésis de +1 °C avant de relancer.
      default: 15
      selector:
        number:
          min: 5
          max: 25
          unit_of_measurement: "°C"
          mode: box

    aux_summer_floor:
      name: ☀️ Plancher des thermostats auxiliaires
      description: >
        En mode été, les plinthes auxiliaires sont fixées à cette consigne
        basse pour qu'elles ne déclenchent jamais de chauffage.
      default: 16
      selector:
        number:
          min: 10
          max: 18
          unit_of_measurement: "°C"
          mode: slider

mode: single

trigger:
  # ---- Triggers communs (both modes) ----
  - id: anybody_home
    platform: state
    entity_id:
      - !input anybody_home

  - id: summer_mode_toggle
    platform: state
    entity_id: !input summer_mode

  # ---- Triggers hiver ----
  - id: outside_below_min
    platform: numeric_state
    entity_id: !input outside_temp_sensor
    below: !input min_outside_temp

  - id: outside_above_min
    platform: numeric_state
    entity_id: !input outside_temp_sensor
    above: !input min_outside_temp

  - id: time_from
    platform: time
    at: !input use_target_from

  - id: time_until
    platform: time
    at: !input use_target_until

  # ---- Triggers été ----
  # Verrou extérieur, debounce 5 min : évite le flicker quand la temp extérieure oscille
  # autour du seuil. Le trigger de relâche est décalé de 1°C (hystérésis) pour matcher la
  # variable `outside_lockout`.
  - id: outside_lockout_on
    platform: numeric_state
    entity_id: !input outside_temp_sensor
    below: !input summer_min_outside_temp
    for:
      minutes: 5

  - id: outside_lockout_off
    platform: numeric_state
    entity_id: !input outside_temp_sensor
    value_template: "{{ (state.state | float(0)) - 1 }}"
    above: !input summer_min_outside_temp
    for:
      minutes: 5

  # Bornes de la bande morte intérieure : ce sont les seuls moments où la décision de
  # climatiser peut changer, donc les seuls où l'automation a besoin de se réveiller.
  # value_template décale la valeur pour la comparer directement à summer_target_temp
  # (déjà un !input numérique).
  - id: inside_above_target
    platform: numeric_state
    entity_id: !input heat_pump
    value_template: "{{ (state.attributes.current_temperature | float(0)) - 0.5 }}"
    above: !input summer_target_temp

  - id: inside_below_target
    platform: numeric_state
    entity_id: !input heat_pump
    value_template: "{{ (state.attributes.current_temperature | float(0)) + 1 }}"
    below: !input summer_target_temp

variables:
  heat_pump: !input heat_pump
  aux_thermostats: !input aux_thermostats
  outside_temp_sensor: !input outside_temp_sensor
  anybody_home: !input anybody_home
  # Winter
  min_outside_temp: !input min_outside_temp
  target_temp: !input target_temp
  away_night_temp: !input away_night_temp
  use_target_from: !input use_target_from
  use_target_until: !input use_target_until
  fan_mode: !input fan_mode
  # Summer (mostly derived from summer_target_temp to keep inputs minimal)
  summer_mode: !input summer_mode
  summer_target_temp: !input summer_target_temp
  summer_min_outside_temp: !input summer_min_outside_temp
  cool_on_margin: 0.5
  cool_off_margin: 1
  aux_summer_floor: !input aux_summer_floor
  # Triggers valides par mode : un trigger propre à l'autre saison ne doit pas
  # continuer l'exécution (ex. use_target_until ne doit pas agir en été).
  common_trigger_ids: ["anybody_home", "summer_mode_toggle"]
  summer_trigger_ids: "{{ common_trigger_ids + ['outside_lockout_on', 'outside_lockout_off', 'inside_above_target', 'inside_below_target'] }}"
  winter_trigger_ids: "{{ common_trigger_ids + ['outside_below_min', 'outside_above_min', 'time_from', 'time_until'] }}"
  # Determine which target temperature to use (winter)
  effective_target_temp: >
    {% if use_target_from <= now().strftime('%H:%M:%S') < use_target_until and not is_state(anybody_home, 'off') %}
      {{ target_temp }}
    {% else %}
      {{ away_night_temp }}
    {% endif %}

action:
  - variables:
      outside_temp: "{{ states(outside_temp_sensor) | float(0) }}"
      heat_pump_state: "{{ state_attr(heat_pump, 'hvac_action') }}"
      heat_pump_temp: "{{ state_attr(heat_pump, 'temperature') | float(effective_target_temp) }}"
      is_summer: "{{ is_state(summer_mode, 'on') }}"

  - choose:
      # ===================== SUMMER MODE =====================
      - conditions:
          - condition: template
            value_template: "{{ is_summer and trigger.id in summer_trigger_ids }}"
        sequence:
          - variables:
              inside_temp: "{{ state_attr(heat_pump, 'current_temperature') | float(0) }}"
              heat_pump_is_on: "{{ states(heat_pump) not in ['off', 'unavailable', 'unknown'] }}"
              # Hystérésis : on coupe sous le seuil, on ne relance qu'à seuil + 1 °C.
              outside_lockout: >
                {{ outside_temp < (summer_min_outside_temp | float) + (0 if heat_pump_is_on else 1) }}
              # Les branches rendent {{ true }} / {{ false }} (et non `true` / `false` en
              # texte brut) pour que HA les parse en booléens : une chaîne "false" serait
              # truthy et inverserait la décision.
              should_cool: >
                {% if not is_state(anybody_home, 'on') %} {{ false }}
                {% elif outside_lockout %} {{ false }}
                {% elif inside_temp >= (summer_target_temp | float) + cool_on_margin %} {{ true }}
                {% elif inside_temp <= (summer_target_temp | float) - cool_off_margin %} {{ false }}
                {% else %} {{ heat_pump_is_on }}
                {% endif %}

          # Aux thermostats : pin au floor en mode été (jamais de chauffage)
          - service: climate.set_temperature
            target:
              entity_id: "{{ aux_thermostats }}"
            data:
              temperature: "{{ aux_summer_floor }}"

          - if:
              - condition: template
                value_template: "{{ not should_cool }}"
            then:
              - service: climate.turn_off
                target:
                  entity_id: "{{ heat_pump }}"
            else:
              - service: climate.set_temperature
                target:
                  entity_id: "{{ heat_pump }}"
                data:
                  temperature: "{{ summer_target_temp }}"
                  hvac_mode: cool

              - delay:
                  seconds: 2
              - condition: template
                value_template: "{{ state_attr(heat_pump, 'fan_mode') != fan_mode }}"
              - service: climate.set_fan_mode
                target:
                  entity_id: "{{ heat_pump }}"
                data:
                  fan_mode: "{{ fan_mode }}"

      # ===================== WINTER MODE (logique originale, intacte) =====================
      - conditions:
          - condition: template
            value_template: "{{ not is_summer and trigger.id in winter_trigger_ids }}"
        sequence:
          - choose:
              # CASE 1: Too cold for heat pump
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp < min_outside_temp }}"
                sequence:
                  - service: climate.turn_off
                    target:
                      entity_id: "{{ heat_pump }}"
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ aux_thermostats }}"
                    data:
                      temperature: "{{ effective_target_temp + 0.5 }}"

              # CASE 2: Normal operation (heat pump active)
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp >= min_outside_temp }}"
                sequence:
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      temperature: "{{ effective_target_temp }}"
                      hvac_mode: heat

                  - delay:
                      seconds: 2
                  - condition: template
                    value_template: "{{ state_attr(heat_pump, 'fan_mode') != fan_mode }}"
                  - service: climate.set_fan_mode
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      fan_mode: "{{ fan_mode }}"

                  # Aux thermostats follow heat pump temp - 2 if heating
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ heat_pump_state == 'heating' }}"
                        sequence:
                          - service: climate.set_temperature
                            target:
                              entity_id: "{{ aux_thermostats }}"
                            data:
                              temperature: "{{ heat_pump_temp - 2 }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ heat_pump_state != 'heating' }}"
                        sequence:
                          - service: climate.set_temperature
                            target:
                              entity_id: "{{ aux_thermostats }}"
                            data:
                              temperature: "{{ (state_attr(heat_pump, 'temperature') | float(effective_target_temp)) - 2 }}"
