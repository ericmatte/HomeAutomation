blueprint:
  name: 🌡️ Contrôleur climatique intelligent
  description: |
    Orchestre une thermopompe et des thermostats auxiliaires (plinthes) à l'année, avec bascule hiver/été pilotée par un `input_boolean`.

    - ⚡ **Déclencheur** : changement de présence, seuils de température extérieure, horaires clés (début/fin confort hiver), changement de la température intérieure de la thermopompe (réactivité été), ou bascule du mode été.
    - 🎯 **Action hiver** : thermopompe sur consigne effective (confort si plage horaire + présence, sinon nuit/absence), auxiliaires à -2 °C en suiveur. Si extérieur < seuil minimum → thermopompe OFF et auxiliaires prennent le relais à +0,5 °C.
    - 🎯 **Action été** : auxiliaires épinglés au plancher (jamais de chauffage), puis cooling sur une seule consigne été fixe.
    - 💨 **Ventilateur boosté** : en été, si l'intérieur atteint la consigne été + 2 °C, le ventilateur passe à `high` (au lieu du mode configuré) le temps de rattraper le retard.
    - ✋ **Actions manuelles** : changer la consigne ou couper la thermopompe ne déclenche pas l'automation ; elle reprend seulement au prochain déclencheur prévu.
    - 🌀 **Anti-cycle court** : en été, si intérieur ≤ consigne − 1 °C → thermopompe OFF temporairement, évite les démarrages/arrêts rapprochés autour du setpoint intérieur.
    - ⏱️ **Anti-flicker seuil extérieur** : la température extérieure doit rester du même côté du seuil pendant 5 min avant de déclencher ON/OFF — pas d'oscillation quand la valeur frôle le seuil.
    - ⏱️ **Anti-flicker boost ventilateur** : le déclencheur du boost a un jeu de ±0,5 °C (active à consigne +2,5 °C, désactive à consigne +1,5 °C) pour éviter le spam de déclenchements si l'intérieur oscille pile autour de +2 °C.

    ```
                          ┌──────────────────┐
                          │  summer_mode ?   │
                          └────────┬─────────┘
                       OFF ────────┴──────── ON
                        │                     │
                  ┌─────▼─────┐         ┌─────▼─────────────────┐
                  │  HIVER    │         │  ÉTÉ                  │
                  └─────┬─────┘         │  aux → floor (pin)    │
                        │               └─────┬─────────────────┘
              ext < min_outside_temp ?        │
                   ┌────┴────┐         personne à la maison ?
                  OUI       NON              ┌─┴─┐
                   │         │              NON OUI
            ┌──────▼──┐  ┌───▼─────┐         │    │
            │ HP OFF  │  │ HP ON   │      ┌──▼─┐  │
            │ aux +0.5│  │ consigne│      │OFF │  │
            └─────────┘  │ effect. │      └────┘  │
                         │ aux −2  │       ext < cible été ?
                         └─────────┘             ┌─┴─┐
                                                OUI  NON
                                                 │    │
                                            ┌────▼─┐ ┌▼─────────────────────┐
                                            │HP OFF│ │ consigne = cible été │
                                            └──────┘ │ + anti-cycle court   │
                                                     │ + boost ventilo      │
                                                     │   si int ≥ +2 °C     │
                                                     └───────────────────────┘
    ```

  domain: automation
  input:
    # ---- Paramètres communs ----
    heat_pump:
      name: 🌀 Thermopompe
      description: L'entité principale de la thermopompe.
      selector:
        entity:
          domain: climate

    aux_thermostats:
      name: 🔥 Thermostats auxiliaires
      description: Un ou plusieurs thermostats auxiliaires (plinthes).
      selector:
        entity:
          domain: climate
          multiple: true

    outside_temp_sensor:
      name: 🌡️ Capteur de température extérieure
      description: Sonde extérieure utilisée pour les seuils hiver (min thermopompe) et été (besoin de refroidir).
      selector:
        entity:
          domain: sensor

    anybody_home:
      name: 🏠 Capteur de présence
      description: Binary sensor agrégé — `on` = au moins une personne à la maison, `off` = maison vide.
      selector:
        entity:
          domain: binary_sensor

    fan_mode:
      name: 🌀 Mode du ventilateur
      description: Mode du ventilateur à appliquer sur la thermopompe en hiver et en été.
      default: auto
      selector:
        select:
          options:
            - auto
            - low
            - med
            - high
            - quiet

    summer_mode:
      name: 🔀 Bascule mode été
      description: >
        Input boolean qui détermine le mode actif.
        ON = été (climatisation). OFF = hiver (comportement original).
        Câblable à une switch physique pour un override matériel.
      selector:
        entity:
          domain: input_boolean

    # ---- Paramètres du mode hiver ----
    min_outside_temp:
      name: ❄️ Température extérieure minimum pour la thermopompe
      description: >
        En dessous de cette température, la thermopompe est coupée et les
        thermostats auxiliaires prennent le relais.
      default: -10
      selector:
        number:
          min: -30
          max: 10
          unit_of_measurement: "°C"
          mode: box

    target_temp:
      name: ❄️ Température cible
      description: Température de confort normale en hiver.
      default: 21
      selector:
        number:
          min: 16
          max: 25
          unit_of_measurement: "°C"
          mode: slider

    away_night_temp:
      name: ❄️ Consigne nuit/absence
      description: Température à utiliser quand tout le monde est parti ou pendant les heures de nuit.
      default: 18
      selector:
        number:
          min: 16
          max: 25
          unit_of_measurement: "°C"
          mode: slider

    use_target_from:
      name: ❄️ Début de la plage "confort"
      description: Heure à laquelle la consigne de confort devient active (hiver).
      default: "07:00"
      selector:
        time:

    use_target_until:
      name: ❄️ Fin de la plage "confort"
      description: Heure à laquelle la consigne nuit/absence devient active en hiver.
      default: "22:00"
      selector:
        time:

    # ---- Paramètres du mode été ----
    summer_target_temp:
      name: ☀️ Température cible
      description: Température cible en été. Sert aussi de seuil extérieur pour activer la climatisation.
      default: 20
      selector:
        number:
          min: 18
          max: 28
          unit_of_measurement: "°C"
          mode: slider

    aux_summer_floor:
      name: ☀️ Plancher des thermostats auxiliaires
      description: >
        En mode été, les plinthes auxiliaires sont fixées à cette consigne
        basse pour qu'elles ne déclenchent jamais de chauffage.
      default: 16
      selector:
        number:
          min: 10
          max: 18
          unit_of_measurement: "°C"
          mode: slider

mode: single

trigger:
  # ---- Triggers communs (hérités) ----
  - platform: state
    entity_id:
      - !input anybody_home

  - platform: numeric_state
    entity_id: !input outside_temp_sensor
    below: !input min_outside_temp

  - platform: numeric_state
    entity_id: !input outside_temp_sensor
    above: !input min_outside_temp

  - platform: time
    at: !input use_target_from

  - platform: time
    at: !input use_target_until

  # ---- Triggers été ----
  - platform: state
    entity_id: !input summer_mode

  # Debounce 5 min : évite le flicker quand la temp extérieure oscille autour du seuil.
  # Constante interne (non exposée en input).
  - platform: numeric_state
    entity_id: !input outside_temp_sensor
    above: !input summer_target_temp
    for:
      minutes: 5

  - platform: numeric_state
    entity_id: !input outside_temp_sensor
    below: !input summer_target_temp
    for:
      minutes: 5

  # Réactivité été : boost ventilateur quand l'intérieur franchit summer_target_temp + 2°C.
  # numeric_state (pas platform: state) pour ne déclencher QUE sur le franchissement du
  # seuil, pas à chaque variation de current_temperature. value_template soustrait la marge
  # pour comparer directement à summer_target_temp (déjà un !input numérique).
  # Jeu de ±0.5°C entre les deux triggers (2.5 à la hausse, 1.5 à la baisse) pour éviter le
  # flicker si l'intérieur oscille pile autour du seuil +2°C.
  # Inoffensif en hiver (branche hiver n'utilise pas inside_temp).
  - platform: numeric_state
    entity_id: !input heat_pump
    value_template: "{{ (state.attributes.current_temperature | float(0)) - 2.5 }}"
    above: !input summer_target_temp

  - platform: numeric_state
    entity_id: !input heat_pump
    value_template: "{{ (state.attributes.current_temperature | float(0)) - 1.5 }}"
    below: !input summer_target_temp

variables:
  heat_pump: !input heat_pump
  aux_thermostats: !input aux_thermostats
  outside_temp_sensor: !input outside_temp_sensor
  anybody_home: !input anybody_home
  # Winter
  min_outside_temp: !input min_outside_temp
  target_temp: !input target_temp
  away_night_temp: !input away_night_temp
  use_target_from: !input use_target_from
  use_target_until: !input use_target_until
  fan_mode: !input fan_mode
  # Summer (mostly derived from summer_target_temp to keep inputs minimal)
  summer_mode: !input summer_mode
  summer_target_temp: !input summer_target_temp
  summer_fan_boost_threshold: "{{ (summer_target_temp | float) + 2 }}"
  cool_off_margin: 1
  aux_summer_floor: !input aux_summer_floor
  # Determine which target temperature to use (winter)
  effective_target_temp: >
    {% if use_target_from <= now().strftime('%H:%M:%S') < use_target_until and not is_state(anybody_home, 'off') %}
      {{ target_temp }}
    {% else %}
      {{ away_night_temp }}
    {% endif %}

action:
  - variables:
      outside_temp: "{{ states(outside_temp_sensor) | float(0) }}"
      heat_pump_state: "{{ state_attr(heat_pump, 'hvac_action') }}"
      heat_pump_temp: "{{ state_attr(heat_pump, 'temperature') | float(effective_target_temp) }}"
      is_summer: "{{ is_state(summer_mode, 'on') }}"

  - choose:
      # ===================== SUMMER MODE =====================
      - conditions:
          - condition: template
            value_template: "{{ is_summer }}"
        sequence:
          - variables:
              inside_temp: "{{ state_attr(heat_pump, 'current_temperature') | float(0) }}"
              is_home: "{{ is_state(anybody_home, 'on') }}"
              outside_too_cool: "{{ outside_temp < (summer_target_temp | float) }}"

          # Aux thermostats : pin au floor en mode été (jamais de chauffage)
          - service: climate.set_temperature
            target:
              entity_id: "{{ aux_thermostats }}"
            data:
              temperature: "{{ aux_summer_floor }}"

          - choose:
              # ----- GATE A : personne à la maison -----
              - conditions:
                  - condition: template
                    value_template: "{{ not is_home }}"
                sequence:
                  - service: climate.turn_off
                    target:
                      entity_id: "{{ heat_pump }}"

              # ----- GATE B : extérieur déjà frais -----
              - conditions:
                  - condition: template
                    value_template: "{{ outside_too_cool }}"
                sequence:
                  - service: climate.turn_off
                    target:
                      entity_id: "{{ heat_pump }}"

            # ----- DEFAULT : cooling actif -----
            default:
              - choose:
                  # Intérieur déjà assez froid → off (marge anti-cycle)
                  - conditions:
                      - condition: template
                        value_template: "{{ inside_temp <= (summer_target_temp | float - cool_off_margin) }}"
                    sequence:
                      - service: climate.turn_off
                        target:
                          entity_id: "{{ heat_pump }}"
                default:
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      temperature: "{{ summer_target_temp }}"
                      hvac_mode: cool

                  # Boost ventilo si l'intérieur traîne loin au-dessus de la cible
                  - variables:
                      summer_fan_target: "{{ 'high' if inside_temp >= (summer_fan_boost_threshold | float) else fan_mode }}"

                  - delay:
                      seconds: 2
                  - condition: template
                    value_template: "{{ state_attr(heat_pump, 'fan_mode') != summer_fan_target }}"
                  - service: climate.set_fan_mode
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      fan_mode: "{{ summer_fan_target }}"

      # ===================== WINTER MODE (logique originale, intacte) =====================
      - conditions:
          - condition: template
            value_template: "{{ not is_summer }}"
        sequence:
          - choose:
              # CASE 1: Too cold for heat pump
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp < min_outside_temp }}"
                sequence:
                  - service: climate.turn_off
                    target:
                      entity_id: "{{ heat_pump }}"
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ aux_thermostats }}"
                    data:
                      temperature: "{{ effective_target_temp + 0.5 }}"

              # CASE 2: Normal operation (heat pump active)
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp >= min_outside_temp }}"
                sequence:
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      temperature: "{{ effective_target_temp }}"
                      hvac_mode: heat

                  - delay:
                      seconds: 2
                  - condition: template
                    value_template: "{{ state_attr(heat_pump, 'fan_mode') != fan_mode }}"
                  - service: climate.set_fan_mode
                    target:
                      entity_id: "{{ heat_pump }}"
                    data:
                      fan_mode: "{{ fan_mode }}"

                  # Aux thermostats follow heat pump temp - 2 if heating
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ heat_pump_state == 'heating' }}"
                        sequence:
                          - service: climate.set_temperature
                            target:
                              entity_id: "{{ aux_thermostats }}"
                            data:
                              temperature: "{{ heat_pump_temp - 2 }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ heat_pump_state != 'heating' }}"
                        sequence:
                          - service: climate.set_temperature
                            target:
                              entity_id: "{{ aux_thermostats }}"
                            data:
                              temperature: "{{ (state_attr(heat_pump, 'temperature') | float(effective_target_temp)) - 2 }}"
