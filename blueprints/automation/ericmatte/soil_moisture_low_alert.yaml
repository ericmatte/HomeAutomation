blueprint:
  name: 🌱 Alerte humidité du sol basse
  description: |
    Surveille l'humidité du sol d'une plante et envoie une notification push quand elle a soif.

    - 📉 **Déclencheur** : l'humidité du capteur descend SOUS le seuil configuré.
    - 🔔 **Action** : notification push sur l'appareil mobile choisi, avec titre et message personnalisables.
    - 🔁 **Ré-armement** : se redéclenche seulement après que l'humidité soit remontée au-dessus du seuil — pas de spam si la valeur oscille autour de la limite.
  domain: automation
  input:
    moisture_sensor:
      name: 🌱 Capteur d'humidité du sol
      description: Le capteur qui mesure l'humidité de la plante (en %).
      selector:
        entity:
          domain: sensor

    threshold:
      name: 💧 Seuil d'humidité (%)
      description: Déclenche la notification quand le capteur descend SOUS ce pourcentage.
      default: 30
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    notify_device:
      name: 📱 Appareil à notifier
      description: L'appareil mobile qui reçoit la notification push.
      selector:
        device:
          integration: mobile_app

    notification_title:
      name: 📝 Titre de la notification
      description: Titre affiché dans la notification (emojis bienvenus).
      default: "🌱 Plante assoiffée"
      selector:
        text:

    notification_message:
      name: 💬 Message de la notification
      description: >
        Corps de la notification. Supporte les templates Jinja — placeholders
        disponibles : {{ sensor_name }} (nom convivial du capteur),
        {{ moisture }} (valeur actuelle), {{ threshold_value }} (seuil choisi).
      default: "💧 {{ sensor_name }} est à {{ moisture }} % — il faut l'arroser !"
      selector:
        text:
          multiline: true

variables:
  threshold_value: !input threshold

trigger:
  - platform: numeric_state
    entity_id: !input moisture_sensor
    below: !input threshold

action:
  - variables:
      sensor_entity: "{{ trigger.entity_id }}"
      sensor_name: "{{ state_attr(sensor_entity, 'friendly_name') or sensor_entity }}"
      moisture: "{{ states(sensor_entity) }}"
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: !input notification_title
    message: !input notification_message

mode: single
