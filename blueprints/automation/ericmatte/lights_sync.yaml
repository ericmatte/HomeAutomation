blueprint:
  name: Keep lights in sync (on/off & brightness, simple)
  description: >
    Synchronize on/off and brightness between multiple lights.
    Optionally add extra conditions.
  domain: automation
  input:
    lights:
      name: Lights
      description: Select all lights to keep synchronized
      selector:
        entity:
          domain: light
          multiple: true

    extra_conditions:
      name: Additional conditions (optional)
      description: Only run the automation if these conditions are met
      default: []
      selector:
        condition:

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input lights

condition:
  # Only react to physical actions (ignoring automation and in-app changes)
  - condition: template
    value_template: >
      {{ trigger.to_state.context.parent_id == none and
         trigger.to_state.context.user_id == none }}

  # User-defined conditions
  - condition: and
    conditions: !input extra_conditions

variables:
  changed_light: "{{ trigger.entity_id }}"
  all_lights: !input lights
  brightness: >
    {% if trigger.to_state.state == 'on' %}
      {{ trigger.to_state.attributes.get('brightness', 255) | int }}
    {% else %}
      0
    {% endif %}

  target_entity_ids: >
    {{ all_lights | reject('eq', changed_light) | list }}

action:
  - choose:
      # If turned off → turn others off
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: "{{ target_entity_ids }}"

    default:
      # Otherwise → turn on + sync brightness
      - service: light.turn_on
        target:
          entity_id: "{{ target_entity_ids }}"
        data:
          brightness: "{{ brightness }}"
