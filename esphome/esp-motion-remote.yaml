esphome:
  name: esp-motion-remote

esp8266:
  board: nodemcuv2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.0.21
    gateway: 192.168.0.1
    subnet: 255.255.255.0

  ap:
    ssid: "Esp-MotionRemote Hotspot"
    password: !secret wifi_password

captive_portal:

logger:

api:
  encryption:
    key: !secret esp_motion_remote_encryption_key

ota:
  - platform: esphome
    password: !secret esp_motion_remote_password

binary_sensor:
  - platform: gpio
    name: "Eric left button"
    pin:
      number: D1
      mode: INPUT_PULLUP
      inverted: true

  - platform: gpio
    name: "Eric middle button"
    pin:
      number: D2
      mode: INPUT_PULLUP
      inverted: true

  - platform: gpio
    name: "Eric right button"
    pin:
      number: D3
      mode: INPUT_PULLUP
      inverted: true

  - platform: gpio
    name: "Caro button"
    pin:
      number: D7
      mode: INPUT_PULLUP
      inverted: true

  - platform: gpio
    name: Motion entrance
    device_class: motion
    pin: D6
