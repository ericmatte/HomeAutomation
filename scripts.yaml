  - action: media_player.turn_off
    metadata: {}
    data: {}
    target:
      device_id: 67ea5e07670054e7478713b887ed5895
  - action: climate.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: climate.heat_pump
    enabled: false
