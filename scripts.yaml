turn_off_things_before_sleeping:
  sequence:
  - action: light.turn_off
    metadata: {}
    data: {}
    target:
      floor_id:
      - basement
      area_id:
      - entrance
      - kitchen
      - living_room
      - hallway
      - outside
      - upstairs_bathroom
      - dining_room
  - action: media_player.turn_off
    metadata: {}
    data: {}
