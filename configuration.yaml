homeassistant:
  name: Home
  latitude: !secret latitude
  longitude: !secret longitude
  elevation: !secret elevation
  unit_system: metric
  time_zone: America/Toronto
  country: "CA"
  currency: CAD
  internal_url: !secret internal_url
  # external_url: !secret external_url
  # customize: !include customize.yaml

frontend:
  themes: !include_dir_merge_named themes

recorder:
  auto_purge: true
  purge_keep_days: 90

my:
mobile_app:
config:
system_health:
default_config:
history:
logbook:
sun:

http:
  login_attempts_threshold: 50
  ip_ban_enabled: False

# logger:
#   default: warning
#   logs:
#     homeassistant.components.switch.command_line: critical

# zwave:
#   usb_path: /dev/ttyACM1 # /dev/ttyACM0

smartir:
  check_updates: false

climate:
  - platform: smartir
    name: Heat pump
    unique_id: heat_pump
    device_code: 1281 # elios-heat-pump-smartir-codes.json
    controller_data: remote.rm4
    temperature_sensor: sensor.rm4_temperature
    humidity_sensor: sensor.rm4_humidity

command_line:
  - sensor:
      name: CPU temperature
      command: "cat /sys/class/thermal/thermal_zone0/temp"
      unit_of_measurement: "°C"
      value_template: "{{ value | multiply(0.001) | round(1) }}"
  - sensor:
      name: Database filesize
      command: "du -m /config/home-assistant_v2.db | cut -f1"
      unit_of_measurement: "MB"
      value_template: "{{ value | int - 1 }}"

utility_meter:
  hydro_sherbrooke_daily:
    source: sensor.hydro_sherbrooke_reading
    name: Hydro Sherbrooke daily consumption
    cycle: daily

sensor:
  - platform: derivative
    source: sensor.hydro_sherbrooke_reading
    name: Hydro Sherbrooke power
    unit_time: h
    unit: kW
    time_window: "00:05:00"
    round: 3

template:
  - sensor:
      - name: Propane Tank Level
        unit_of_measurement: "%"
        device_class: battery
        unique_id: rainville_propane_tank
        default_entity_id: sensor.rainville_propane_tank
        state: "{{ states('sensor.rainville_propane_raw') }}"
        attributes:
          last_updated: "{{ state_attr('sensor.rainville_propane_raw', 'last_updated') }}"
          last_rainville_update: "{{ state_attr('sensor.rainville_propane_raw', 'last_rainville_update') }}"
          next_estimated_delivery: "{{ state_attr('sensor.rainville_propane_raw', 'next_estimated_delivery') }}"

      - name: "Hydro Sherbrooke current price"
        unique_id: hydro_sherbrooke_current_price
        unit_of_measurement: "CAD/kWh"
        state: >
          {% set daily = states('sensor.hydro_sherbrooke_daily_consumption') | float(0) %}
          {% if daily < 40 %}
            0.06905
          {% else %}
            0.10652
          {% endif %}

      - name: "Hydro Sherbrooke daily total cost"
        unique_id: hydro_sherbrooke_daily_total_cost
        unit_of_measurement: "CAD"
        device_class: monetary
        state: >
          {% set daily = states('sensor.hydro_sherbrooke_daily_consumption') | float(0) %}
          {% set access = 0.46154 %}
          {% if daily <= 40 %}
            {% set energy = daily * 0.06905 %}
          {% else %}
            {% set energy = 40 * 0.06905 + (daily - 40) * 0.10652 %}
          {% endif %}
          {{ ((access + energy) * 1.14975) | round(2) }}
        attributes:
          access_fee: 0.46154
          energy_cost: >
            {% set daily = states('sensor.hydro_sherbrooke_daily_consumption') | float(0) %}
            {% if daily <= 40 %}
              {{ (daily * 0.06905) | round(4) }}
            {% else %}
              {{ (40 * 0.06905 + (daily - 40) * 0.10652) | round(4) }}
            {% endif %}
          taxes_rate: 0.14975

      - name: "Hydro Sherbrooke tier 2 marker"
        unique_id: hydro_sherbrooke_tier2_marker
        state: >
          {% if is_state('binary_sensor.hydro_sherbrooke_tier_2_alert', 'on') %}
            100
          {% else %}
            0
          {% endif %}

  - binary_sensor:
      - name: "Hydro Sherbrooke tier 2 alert"
        unique_id: hydro_sherbrooke_tier2_alert
        device_class: problem
        icon: mdi:flash-alert
        state: "{{ states('sensor.hydro_sherbrooke_daily_consumption') | float(0) > 40 }}"

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
