- id: '1768185894945'
  alias: Phone call
  description: ''
  triggers:
  - domain: mqtt
    device_id: 8317fbc3ea314ec40186f0d8ec39998d
    type: action
    subtype: single
    trigger: device
    id: single press
  conditions: []
  actions:
  - action: assist_satellite.ask_question
    metadata: {}
    data:
      preannounce: false
      entity_id: assist_satellite.192_168_0_160
      answers:
      - id: 'yes'
        sentences:
        - 'yes'
        - oui
      - id: 'no'
        sentences:
        - 'no'
        - non
      question: Oui allô! Est-ce que je parle à Mike? Es-tu prêt pour une aventure
        des plus extraordinaire? Super, je te demanderai de raccrocher le téléphone,
        et la lumière te guidera. Trouves les lettres cacher et le trésor sera à toi.
        À chaque lettre trouvé, entre le bon nombre sur le téléphone. Bonne chance!
    response_variable: answer
  - if:
    - condition: template
      value_template: '{{ answer.id == ''yes'' }}'
    then:
    - action: media_player.volume_set
      metadata: {}
      target:
        entity_id: media_player.sonos
      data:
        volume_level: 0.5
    - action: media_player.play_media
      metadata: {}
      target:
        entity_id: media_player.sonos
      data:
        media:
          media_content_id: media-source://media_source/local/Never Gonna Give You
            Up.mp3
          media_content_type: audio/mpeg
          metadata:
            title: Never Gonna Give You Up.mp3
            thumbnail:
            media_class: music
            children_media_class:
            navigateIds:
            - {}
            - media_content_type: app
              media_content_id: media-source://media_source
            browse_entity_id: media_player.sonos
        enqueue: play
    - action: light.turn_on
      metadata: {}
      target:
        entity_id:
        - light.left_floor_lamp
        - light.right_floor_lamp
      data:
        rgb_color:
        - 0
        - 255
        - 255
        brightness_pct: 70
        transition: 2
    else:
    - action: assist_satellite.announce
      metadata: {}
      target:
        entity_id: assist_satellite.192_168_0_160
      data:
        preannounce: false
        message: Pas de problème, à une prochaine fois alors!
  mode: restart
- id: '1768618057000'
  alias: Escape room - Part 2
  description: ''
  triggers:
  - trigger: conversation
    command:
    - indice
    - '{a}indice'
    - indice{b}
    - '{a}indice{b}'
    id: hint
  - trigger: conversation
    command:
    - Tout[e] l'après-midi
    - '{a}Tout[e] l''après-midi'
    - Tout[e] l'après-midi{b}
    - '{a}Tout[e] l''après-midi{b}'
    id: t
  - trigger: conversation
    command:
    - En[tre][ de] bonne compagnie
    - '{a}En[tre][ de] bonne compagnie'
    - En[tre][ de] bonne compagnie{b}
    - '{a}En[tre][ de] bonne compagnie{b}'
    id: e
  - domain: mqtt
    device_id: 8317fbc3ea314ec40186f0d8ec39998d
    type: action
    subtype: single
    trigger: device
    id: button
    alias: Clicking on the button
  - trigger: conversation
    command:
    - Agréable et réconfortant
    - '{a}Agréable et réconfortant'
    - Agréable et réconfortant{b}
    - '{a}Agréable et réconfortant{b}'
    id: a
  - trigger: state
    entity_id:
    - binary_sensor.vibration_sensor_vibration
    to:
    - 'on'
    id: treasure
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - hint
      sequence:
      - set_conversation_response: 'Trouve la lettre cachée et viens me dire la phrase
          secrète.


          Il y a 3 lettres à trouver.


          Il semblerait que les lumières de couleurs ont quelque chose de spécial
          à dire. Regarde aux alentours voir si tu ne pourrais pas déceler la lettre
          et la phrase cachée.'
    - conditions:
      - condition: trigger
        id:
        - t
      sequence:
      - set_conversation_response: ' '
      - alias: 'Phase 3: Found the letter T, now checking for letter E'
        sequence:
        - action: script.turn_off
          metadata: {}
          target:
            entity_id: script.rgb_color_loop
          data: {}
        - action: light.turn_off
          metadata: {}
          target:
            floor_id:
            - basement
            area_id:
            - living_room
            - bedroom
            - upstairs_bathroom
            - entrance
          data:
            transition: 2
          enabled: true
        - action: light.turn_on
          metadata: {}
          data:
            transition: 2
            brightness_pct: 5
          target:
            area_id:
            - dining_room
            - kitchen
            entity_id: light.hallway_lights
        - action: media_player.volume_set
          metadata: {}
          target:
            entity_id: media_player.sonos
          data:
            volume_level: 0.3
        - action: media_player.play_media
          metadata: {}
          target:
            entity_id: media_player.sonos
          data:
            enqueue: play
            media:
              media_content_id: media-source://media_source/local/The Clown's Theme.mp3
              media_content_type: audio/mpeg
              metadata:
                title: The Clown's Theme.mp3
                thumbnail:
                media_class: music
                children_media_class:
                navigateIds:
                - {}
                - media_content_type: app
                  media_content_id: media-source://media_source
                browse_entity_id: media_player.sonos
        - delay:
            hours: 0
            minutes: 0
            seconds: 3
            milliseconds: 500
        - action: light.turn_on
          metadata: {}
          target:
            entity_id:
            - light.chandelier
          data:
            transition: 1
            brightness_pct: 10
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - action: tts.speak
          metadata: {}
          target:
            entity_id: tts.home_assistant_cloud
          data:
            cache: true
            media_player_entity_id: media_player.sonos
            message: Bien joué! Tu as trouvé la lettre "T". Il te reste maintenant
              2 lettres à trouver. Je me demande où pourrait bien se cacher la 2e
              lettre..
            language: fr-FR
        - delay:
            hours: 0
            minutes: 0
            seconds: 9
            milliseconds: 0
        - action: light.turn_off
          metadata: {}
          target:
            entity_id:
            - light.chandelier
          data:
            transition: 2
        - delay:
            hours: 0
            minutes: 0
            seconds: 6
            milliseconds: 0
        - alias: Alternating Flash RGB Lights
          sequence:
          - repeat:
              count: 5
