- id: '1761237786458'
  alias: Button
  description: ''
  triggers:
  - domain: mqtt
    device_id: 8317fbc3ea314ec40186f0d8ec39998d
    type: action
    subtype: single
    trigger: device
    id: single press
  - domain: mqtt
    device_id: 8317fbc3ea314ec40186f0d8ec39998d
    type: action
    subtype: double
    trigger: device
    id: double press
  - domain: mqtt
    device_id: 8317fbc3ea314ec40186f0d8ec39998d
    type: action
    subtype: long
    trigger: device
    id: long press
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - single press
      sequence:
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 0
        target:
          entity_id: scene.red_warning
      - alias: Tell a story
        sequence:
        - action: media_player.volume_set
          metadata: {}
          data:
            volume_level: 0.75
          target:
            entity_id: media_player.sonos
        - action: tts.speak
          metadata: {}
          data:
            cache: true
            media_player_entity_id: media_player.sonos
            message: 'Warning: self-destruct feature enabled. Please exit the perimeter
              before countdown. 5, 4, 3, 2, 1, bam!'
            language: en-US
          target:
            entity_id: tts.home_assistant_cloud
        - action: tts.speak
          metadata: {}
          data:
            cache: true
            media_player_entity_id: media_player.sonos
            language: fr-CA
            message: Vous avez enclenché le mode d'auto destruction. Auto destruction
              dans 5, 4, 3, 2, 1
          target:
            entity_id: tts.home_assistant_cloud
          enabled: false
        - action: tts.speak
          metadata: {}
          data:
            cache: true
            media_player_entity_id: media_player.sonos
            message: Il était une fois l'histoire d'une personne très spécial qui
              pèsa sur le mystérieux bouton. Cette personne se trouvait dans l'entrée
              de la maison, à jaser avec ses amis, lorsque tout à coup, elle aperceva
              ce mystérieux bouton. Rempli de curiosité, la personne cliqua sur le
              bouton, et entendu son histoire se dérouler devant elle. C'était, il
              faut se le dire, toute qu'une histoire! Et maintenant, et oui, c'est
              déjà la fin de cette magnifique histoire. Fin!
            language: fr-CA
          target:
            entity_id: tts.home_assistant_cloud
          enabled: false
        enabled: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 500
      - action: light.turn_on
        metadata: {}
        data:
          transition: 4
          brightness_pct: 100
        target:
          area_id: entrance
      - delay:
          hours: 0
          minutes: 0
          seconds: 4
          milliseconds: 0
      - repeat:
          count: 3
          sequence:
          - action: light.toggle
            metadata: {}
            data:
              brightness_pct: 100
              transition: 0
            enabled: true
            target:
              area_id: entrance
          - delay:
              hours: 0
              minutes: 0
              seconds: 0
              milliseconds: 500
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 2
        target:
          entity_id: scene.living_lights
    - conditions:
      - condition: trigger
        id:
        - double press
      sequence:
      - action: script.turn_off_all_lights
        metadata: {}
        data: {}
    - conditions:
      - condition: trigger
        id:
        - long press
      sequence:
      - action: light.toggle
        metadata: {}
        data: {}
        target:
          area_id:
          - entrance
          - downstairs_hallway
