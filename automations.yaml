- id: '1755723366418'
  alias: Hidden 3-buttons remote + 1
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.esp_motion_remote_eric_left_button
    id: left_button
    to:
    - 'on'
  - trigger: state
    entity_id:
    - binary_sensor.esp_motion_remote_eric_middle_button
    to:
    - 'on'
    id: middle_button
  - trigger: state
    entity_id:
    - binary_sensor.esp_motion_remote_eric_right_button
    to:
    - 'on'
    id: right_button
  - trigger: state
    entity_id:
    - binary_sensor.esp_motion_remote_caro_button
    to:
    - 'on'
    id: caro_button
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - caro_button
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - binary_sensor.esp_motion_remote_caro_button
          to:
          - 'off'
        timeout:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 700
        continue_on_timeout: true
      - if:
        - condition: template
          value_template: '{{ wait.completed }}'
          alias: Quick click
        then:
        - if:
          - condition: light.is_on
            target:
              entity_id: light.bedroom_2
            options:
              behavior: any
              for: 00:00:00
          then:
          - action: light.turn_off
            metadata: {}
            target:
              area_id: bedroom
            data:
              transition: 1
          else:
          - action: light.turn_on
            metadata: {}
            target:
              entity_id:
              - light.caro_bedside_table
              - light.eric_bedside_table
            data:
              transition: 1
        else:
        - if:
          - condition: state
            entity_id: person.eric
            state:
            - home
          then:
          - action: light.toggle
            metadata: {}
            target:
              entity_id: light.caro_bedside_table
            data:
              transition: 1
          else:
          - action: script.turn_on
            metadata: {}
            data: {}
            target:
              entity_id: script.turn_off_all_lights
    - conditions:
      - condition: trigger
        id:
        - left_button
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - binary_sensor.esp_motion_remote_eric_left_button
          to:
          - 'off'
        timeout:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 700
        continue_on_timeout: true
      - if:
        - condition: template
          value_template: '{{ wait.completed }}'
        then:
        - action: script.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: script.turn_off_things_before_sleeping
        else:
        - action: script.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: script.turn_off_all_lights
    - conditions:
      - condition: trigger
        id:
        - middle_button
      sequence:
      - if:
        - condition: state
          entity_id: light.eric_bedside_table
          state:
          - 'off'
        then:
        - action: light.turn_on
          metadata: {}
          data:
            brightness_pct: 1
            transition: 1
          target:
            entity_id: light.eric_bedside_table
        else:
        - action: light.turn_on
          metadata: {}
          data:
            brightness_pct: 100
            transition: 1
          target:
            entity_id: light.eric_bedside_table
    - conditions:
      - condition: trigger
        id:
        - right_button
      sequence:
      - if:
        - condition: state
          entity_id: light.bedroom_2
          state:
          - 'off'
        then:
        - action: hue.activate_scene
          metadata: {}
          data:
            transition: 1
            dynamic: true
          target:
            entity_id: scene.bedroom_natural_light
        else:
        - action: light.turn_on
          metadata: {}
          data:
            transition: 1
            brightness_pct: 100
          target:
            area_id: bedroom
  mode: parallel
  max: 10
