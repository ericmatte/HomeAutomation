- id: '1663895419097'
  alias: Hue remote
  description: ''
  use_blueprint:
    path: ericmatte/philips_hue_v2_smart_dimmer_switch.yaml
    input:
      hue_device: eba9d8b4257ce13c892979b9e850a7fb
      Power_Press:
      - choose:
        - conditions:
          - condition: state
            entity_id: light.bedroom_2
            state: 'off'
          sequence:
          - action: hue.activate_scene
            metadata: {}
            data:
              transition: 1
              dynamic: true
            target:
              entity_id: scene.bedroom_natural_light
        default:
        - action: light.turn_off
          metadata: {}
          data:
            transition: 2
          target:
            entity_id: light.bedroom_2
      Up_Press:
      - if:
        - condition: state
          entity_id: cover.bot_curtains
          state:
          - opening
        then:
        - target:
            entity_id: cover.bot_curtains
          action: cover.stop_cover
          data: {}
        else:
        - action: cover.open_cover
          target:
            entity_id:
            - cover.bot_curtains
          data: {}
      Down_Press:
      - if:
        - condition: state
          entity_id: cover.bot_curtains
          state: closing
        then:
        - target:
            entity_id: cover.bot_curtains
          action: cover.stop_cover
          data: {}
        else:
        - target:
            entity_id: cover.bot_curtains
          action: cover.close_cover
          data: {}
      Hue_Press:
      - action: light.turn_on
        metadata: {}
        data:
          transition: 1
          brightness_pct: 100
        target:
          area_id: bedroom
      Down_Short_Release: []
      Down_Repeat: []
      Up_Short_Release: []
      Up_Repeat: []
      Hue_Long_Release: []
- id: '1754713870026'
  alias: Turn off all when going to bed
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.eric_phone_battery_state
    to: charging
    id: charger
  - trigger: state
    entity_id:
    - light.bedroom_2
    to: 'off'
    id: lights_off
  conditions:
  - condition: time
    after: '22:00:00'
    before: 02:00:00
  - condition: state
    entity_id: sensor.eric_phone_battery_state
    state: charging
  - condition: or
    conditions:
    - condition: state
      entity_id: light.bedroom_2
      state: 'off'
    - condition: numeric_state
      entity_id: light.eric_bedside_table
      attribute: brightness
      above: 0
      below: 5
  actions:
  - action: script.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: script.turn_off_all_lights
  mode: single
- id: '1755658280925'
  alias: Sync heat with lights
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - light.theatre
    to: 'on'
    from: 'off'
    id: turn_on
  - trigger: state
    entity_id:
    - light.theatre
    from: 'on'
    to: 'off'
    id: turn_off
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - turn_on
      - condition: sun
        after: sunset
      sequence:
      - if:
        - condition: state
          entity_id: climate.theatre_thermostat
          attribute: preset_mode
          state: none
        then:
        - action: climate.set_temperature
          metadata: {}
          data:
            temperature: 21.5
          target:
            area_id: theatre
        alias: Crank up heat
    - conditions:
      - condition: trigger
        id:
        - turn_off
      sequence:
      - alias: Turn down heat
        if:
        - condition: state
          entity_id: climate.theatre_thermostat
          attribute: preset_mode
          state: none
        then:
        - action: climate.set_temperature
          metadata: {}
          data:
            temperature: 20
          target:
            area_id: theatre
  mode: single
- id: '1755658699501'
  alias: Motion (5 min before sunset, 1h after)
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.motion_remote
    to: 'on'
    from: 'off'
    id: motion
  - trigger: state
    entity_id:
    - light.bedroom_2
    to: 'on'
    id: lights_on
  conditions:
  - condition: time
    before: 02:00:00
    after: 08:00:00
  - condition: or
    conditions:
    - condition: trigger
      id:
      - lights_on
    - condition: state
      entity_id: light.bedroom_2
      state: 'off'
      for:
        hours: 0
        minutes: 0
        seconds: 30
    - condition: state
      entity_id: light.bedroom_2
      state: 'on'
  - alias: If not everybody is sleeping
    condition: not
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: sensor.eric_phone_battery_state
        state: charging
      - condition: state
        entity_id: sensor.caro_phone_battery_state
        state: charging
  actions:
  - if:
    - condition: time
      after: '18:00:00'
      before: 02:00:00
    - condition: state
      entity_id: sensor.caro_phone_battery_state
      state: charging
    then:
    - if:
      - condition: state
        entity_id: light.bedroom_2
        state: 'off'
      then:
      - action: light.turn_on
        metadata: {}
        data:
          transition: 5
          brightness_pct: 22
        target:
          entity_id: light.eric_bedside_table
    else:
    - sequence:
      - if:
        - condition: trigger
          id:
          - motion
        - condition: state
          entity_id: light.bedroom_2
          state: 'off'
        then:
        - action: hue.activate_scene
          metadata: {}
          data:
            dynamic: true
            transition: 1
          target:
            entity_id: scene.bedroom_natural_light
      - choose:
        - conditions:
          - condition: sun
            before: sunset
            after: sunrise
          sequence:
          - delay:
              hours: 0
              minutes: 5
              seconds: 0
              milliseconds: 0
        default:
        - delay:
            hours: 1
            minutes: 0
            seconds: 0
            milliseconds: 0
      - action: light.turn_off
        metadata: {}
        data:
          transition: 5
        target:
          area_id: bedroom
  mode: restart
